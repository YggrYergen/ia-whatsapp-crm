name: cloudrun-ia-backend-prod-europe-west1-YggrYergen-ia-whatsapptny
id: 7458b935-6cd5-48e2-b12b-b7115947e39d
description: "Build and deploy to Cloud Run service ia-backend-prod on push to main (us-central1)"
developerConnectEventConfig:
  gitRepositoryLink: projects/saas-javiera/locations/europe-west1/connections/connection-bu4ybqd/gitRepositoryLinks/YggrYergen-ia-whatsapp-crm
  gitRepositoryLinkType: GITHUB
  push:
    branch: main
serviceAccount: projects/saas-javiera/serviceAccounts/ia-calendar-bot@saas-javiera.iam.gserviceaccount.com
tags:
  - gcp-cloud-build-deploy-cloud-run
  - ia-backend-prod
build:
  images:
    - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ia-backend-prod:latest
  options:
    logging: CLOUD_LOGGING_ONLY
    requestedVerifyOption: VERIFIED
    substitutionOption: ALLOW_LOOSE
  steps:
    - name: gcr.io/cloud-builders/docker
      id: Build
      args:
        - build
        - "-t"
        - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ia-backend-prod:latest"
        - "-f"
        - Backend/Dockerfile
        - Backend
    - name: gcr.io/cloud-builders/docker
      id: Push
      args:
        - push
        - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ia-backend-prod:latest"
    - name: gcr.io/google.com/cloudsdktool/cloud-sdk
      id: Deploy
      entrypoint: gcloud
      args:
        - run
        - services
        - update
        - ia-backend-prod
        - "--image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ia-backend-prod:latest"
        - "--region=us-central1"
