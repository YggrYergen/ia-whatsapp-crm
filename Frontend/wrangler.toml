# OpenNext Cloudflare Workers configuration
# Per docs: https://opennext.js.org/cloudflare/get-started#3-create-a-wrangler-configuration-file
#
# ─── Environment Variable Architecture ───────────────────────────────
#
# 1. BUILD-TIME vars (NEXT_PUBLIC_*, SENTRY_AUTH_TOKEN):
#    Set in Workers Builds → "Build variables and secrets" in CF dashboard.
#    These are needed during `next build` to inline values into the client bundle.
#    Ref: https://opennext.js.org/cloudflare/howtos/env-vars#workers-builds
#
# 2. RUNTIME vars (non-sensitive, needed by the Worker at request time):
#    Set here in [vars]. Version-controlled and always present.
#    Ref: https://developers.cloudflare.com/workers/configuration/environment-variables/
#
# 3. SECRETS (sensitive, must NOT be in code):
#    Set via `wrangler secret put <NAME>` or CF dashboard.
#    Currently: SENTRY_AUTH_TOKEN
#    Ref: https://developers.cloudflare.com/workers/configuration/secrets/
#
# ⚠️ compatibility_date >= 2025-08-16 is REQUIRED for Sentry SDK to work.
#   It introduces https.request to the Workers runtime, which @sentry/nextjs
#   needs to send data to Sentry from server-side code.
#   Ref: https://docs.sentry.io/platforms/javascript/guides/cloudflare/frameworks/nextjs/
#
# ⚠️ upload_source_maps enables readable stack traces in Sentry.
#   Ref: https://docs.sentry.io/platforms/javascript/guides/cloudflare/#step-3-add-readable-stack-traces-with-source-maps-optional

name = "ia-whatsapp-crm"
main = ".open-next/worker.js"
compatibility_date = "2025-08-16"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "ia-whatsapp-crm"

