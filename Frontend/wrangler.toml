# OpenNext Cloudflare Workers configuration
# Per docs: https://opennext.js.org/cloudflare/get-started#3-create-a-wrangler-configuration-file
#
# ⚠️ DO NOT add [vars] for NEXT_PUBLIC_* — they must be set as:
#   - "Build variables and secrets" in Workers Builds (for build-time inlining)
#   - "Environment variables" in Workers dashboard (for runtime access)
# See: https://opennext.js.org/cloudflare/howtos/env-vars#production

name = "ia-whatsapp-crm"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "ia-whatsapp-crm"
